<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload | StudyPilot AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
      <div class="container-xxl px-3 px-lg-4">
        <a class="navbar-brand" href="../index.html">Study<span>Pilot</span> AI</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardNav" aria-controls="dashboardNav" aria-expanded="false" aria-label="Toggle navigation">
          <i class="bi bi-list"></i>
        </button>
        <div class="collapse navbar-collapse" id="dashboardNav">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-3">
            <li class="nav-item"><a class="nav-link" href="planner.html">Planner</a></li>
            <li class="nav-item"><a class="nav-link" href="upload.html">Upload</a></li>
            <li class="nav-item"><a class="nav-link" href="ai-chat.html">AI Chat</a></li>
            <li class="nav-item"><a class="nav-link" href="progress.html">Progress</a></li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <a class="btn btn-outline-custom" href="dashboard.html">Back</a>
            <a class="btn btn-primary-custom" href="../index.html">Exit</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container-xxl px-3 px-lg-4 py-5">
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="feature-card reveal">
            <h2>Upload your materials</h2>
            <p class="mb-4">Drop in PDFs, syllabi, slides, or notes and keep everything in one educational workspace.</p>
            <div id="dropzone" class="upload-dropzone">
              <i class="bi bi-cloud-arrow-up" style="font-size: 1.6rem; color: var(--primary-2);"></i>
              <p class="mt-3 mb-2">Drag and drop files here or</p>
              <label class="btn btn-primary-custom" for="fileInput">Choose files</label>
              <input id="fileInput" class="d-none" type="file" multiple />
            </div>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="feature-card reveal">
            <h4 class="mb-3">Recent uploads</h4>
            <ul id="uploadList" class="upload-list"></ul>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
