    <main class="container py-5">

<div class="card shadow p-4">

<h2 class="mb-4">AI Study Planner</h2>

<div class="mb-3">
<label class="form-label">Subject</label>
<input
type="text"
id="subject"
class="form-control"
placeholder="Deep Learning"
/>
</div>

<div class="mb-3">
<label class="form-label">Exam Date</label>
<input 
type="date"
id="exam_date"
class="form-control"
/>
</div>

<div class="mb-3">
<label class="form-label">Hours Per Day</label>
<input
type="number"
id="hours_per_day"
class="form-control"
value="3"
/>
</div>

<div class="mb-3">
<label class="form-label">Current Level</label>

<select
id="current_level"
class="form-select">

<option>Beginner</option>

<option>Intermediate</option>

<option>Advanced</option>

</select>

</div>

<button
class="btn btn-primary"
onclick="generatePlan()">

Generate Study Plan

</button>

<hr>

<h4>Generated Plan</h4>

<div
id="result"
style="white-space:pre-wrap">

Waiting...

</div>

</div>

</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
  <script>

async function generatePlan() {

    

    try {

        const response = await fetch("http://127.0.0.1:8000/planner/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                subject: document.getElementById("subject").value,
                exam_date: document.getElementById("exam_date").value,
                hours_per_day: Number(document.getElementById("hours_per_day").value),
                current_level: document.getElementById("current_level").value
            })
        });

        

        const data = await response.json();

        console.log(data);

        const result = document.getElementById("result");

result.textContent = data.study_plan;
    } catch (e) {

        alert(e);

        console.error(e);

    }

}

</script>
</body>
