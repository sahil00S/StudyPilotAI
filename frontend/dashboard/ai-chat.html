<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat | StudyPilot AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
  </head>
<script>
const form = document.getElementById("chatForm");
const input = document.getElementById("chatInput");
const messages = document.getElementById("chatMessages");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const question = input.value.trim();

    if (!question) return;

    messages.innerHTML += `
        <div class="text-end mb-3">
            <strong>You:</strong><br>${question}
        </div>
    `;

    input.value = "";

    try {

        const response = await fetch("http://127.0.0.1:8000/chat/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: question
            })
        });

        const data = await response.json();

        messages.innerHTML += `
            <div class="mb-4">
                <strong>StudyPilot AI:</strong><br>
                <div style="white-space: pre-wrap;">
                    ${data.response}
                </div>
            </div>
        `;

        messages.scrollTop = messages.scrollHeight;

    } catch (err) {

        messages.innerHTML += `
            <div class="text-danger">
                Failed to connect to AI.
            </div>
        `;

        console.error(err);
    }

});
</script>
  <body>
    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
      <div class="container-xxl px-3 px-lg-4">
        <a class="navbar-brand" href="../index.html">Study<span>Pilot</span> AI</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardNav" aria-controls="dashboardNav" aria-expanded="false" aria-label="Toggle navigation">
          <i class="bi bi-list"></i>
        </button>
        <div class="collapse navbar-collapse" id="dashboardNav">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-3">
            <li class="nav-item"><a class="nav-link" href="planner.html">Planner</a></li>
            <li class="nav-item"><a class="nav-link" href="upload.html">Upload</a></li>
            <li class="nav-item"><a class="nav-link" href="ai-chat.html">AI Chat</a></li>
            <li class="nav-item"><a class="nav-link" href="progress.html">Progress</a></li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <a class="btn btn-outline-custom" href="dashboard.html">Back</a>
            <a class="btn btn-primary-custom" href="../index.html">Exit</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container-xxl px-3 px-lg-4 py-5">
      <div class="feature-card reveal">
        <h2>Ask the AI coach</h2>
        <p>Summaries, explanations, and guided study help are ready whenever you need them.</p>
      </div>

      <div class="chat-shell reveal mt-4">
        <div id="chatMessages" class="chat-messages"></div>
        <form id="chatForm" class="chat-form">
          <input id="chatInput" type="text" placeholder="Ask for a summary, solution, or study tip..." autocomplete="off" />
          <button class="btn btn-primary-custom" type="submit">Send</button>
        </form>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
