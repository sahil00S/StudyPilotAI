<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progress | StudyPilot AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
      <div class="container-xxl px-3 px-lg-4">
        <a class="navbar-brand" href="../index.html">Study<span>Pilot</span> AI</a>
        <div class="d-flex align-items-center gap-2">
          <a class="btn btn-outline-custom" href="dashboard.html">Dashboard</a>
          <a class="btn btn-primary-custom" href="../index.html">Exit</a>
        </div>
      </div>
    </nav>

    <main class="container-xxl px-3 px-lg-4 py-5">
      <div class="feature-card reveal">
        <div class="badge-soft mb-3"><i class="bi bi-graph-up-arrow"></i> Progress hub</div>
        <h2>See how your study week is going</h2>
        <p>Track your progress, streaks, and completed goals from this dedicated page.</p>
      </div>

      <div class="row g-4 mt-1">
        <div class="col-lg-8">
          <div class="feature-card reveal">
            <h4 class="mb-3">Weekly progress</h4>
            <div class="progress-chart">
              <div class="progress-bar-vertical"><span style="height: 55%"></span><small>Mon</small></div>
              <div class="progress-bar-vertical"><span style="height: 82%"></span><small>Tue</small></div>
              <div class="progress-bar-vertical"><span style="height: 68%"></span><small>Wed</small></div>
              <div class="progress-bar-vertical"><span style="height: 90%"></span><small>Thu</small></div>
              <div class="progress-bar-vertical"><span style="height: 84%"></span><small>Fri</small></div>
              <div class="progress-bar-vertical"><span style="height: 71%"></span><small>Sat</small></div>
              <div class="progress-bar-vertical"><span style="height: 88%"></span><small>Sun</small></div>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="feature-card reveal">
            <h4 class="mb-3">Highlights</h4>
            <div class="mini-stat"><span>Study streak</span><strong>5 days</strong></div>
            <div class="mini-stat"><span>Hours</span><strong>14.2</strong></div>
            <div class="mini-stat"><span>Goal progress</span><strong>82%</strong></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
