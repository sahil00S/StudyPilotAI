  <body>
    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
      <div class="container-xxl px-3 px-lg-4">
        <a class="navbar-brand" href="../index.html">Study<span>Pilot</span> AI</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardNav" aria-controls="dashboardNav" aria-expanded="false" aria-label="Toggle navigation">
          <i class="bi bi-list"></i>
        </button>
        <div class="collapse navbar-collapse" id="dashboardNav">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-3">

    <main class="container-xxl px-3 px-lg-4 py-5">
      <div class="feature-card reveal">
        <h2>Settings</h2>
        <p>Adjust your alerts, theme, and study preferences here.</p>
      </div>

      <div class="row g-4 mt-1">
        <div class="col-lg-6">
          <div class="feature-card reveal">
            <h4 class="mb-3">Preference controls</h4>
            <div class="mini-stat"><span>Dark mode</span><strong>On</strong></div>
            <div class="mini-stat"><span>Reminder alerts</span><strong>Enabled</strong></div>
            <div class="mini-stat"><span>Study goal</span><strong>2 hrs/day</strong></div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="feature-card reveal">
            <h4 class="mb-3">Notifications</h4>
            <div class="task-item"><div><strong>Daily plan reminder</strong><div class="task-meta">8:00 AM</div></div><span class="badge-soft">On</span></div>
            <div class="task-item"><div><strong>Break suggestions</strong><div class="task-meta">Every 50 mins</div></div><span class="badge-soft">On</span></div>
          </div>
        </div>
      </div>
    </main>
