<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  </head>
  <script>

async function generateFlashcards(){

const topic=document.getElementById("topic").value;

document.getElementById("flashcardsResult").innerText="Generating Flashcards...";

try{

const response=await fetch("http://127.0.0.1:8000/flashcards/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

topic:topic

})

});

const data=await response.json();

document.getElementById("flashcardsResult").innerText=data.flashcards;

}catch(err){

document.getElementById("flashcardsResult").innerText="Unable to generate flashcards.";

console.log(err);

}

}

</script>

    <main class="container py-5">

<div class="card shadow p-4">

<h2>AI Flashcard Generator</h2>

<div class="mb-3">

<label class="form-label">Topic</label>

<input
id="topic"
class="form-control"
placeholder="Deep Learning">

</div>

<button
class="btn btn-primary"
onclick="generateFlashcards()">

Generate Flashcards

</button>

<hr>

<div
id="flashcardsResult"
style="white-space:pre-wrap;">

Flashcards will appear here...

</div>
