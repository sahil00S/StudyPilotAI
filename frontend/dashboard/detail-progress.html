<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progress Detail | StudyPilot AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
      <div class="container-xxl px-3 px-lg-4">
        <a class="navbar-brand" href="../index.html">Study<span>Pilot</span> AI</a>
        <div class="d-flex align-items-center gap-2">
          <a class="btn btn-outline-custom" href="dashboard.html">Back</a>
          <a class="btn btn-primary-custom" href="../index.html">Exit</a>
        </div>
      </div>
    </nav>

    <main class="container-xxl px-3 px-lg-4 py-5">
      <div class="feature-card reveal">
        <div class="badge-soft mb-3"><i class="bi bi-graph-up-arrow"></i> Progress detail</div>
        <h2>Performance overview</h2>
        <p>Review your weekly focus, completed milestones, and upcoming goals.</p>
      </div>

      <div class="row g-4 mt-1">
        <div class="col-lg-8">
          <div class="feature-card reveal">
            <h4 class="mb-3">Weekly focus</h4>
            <div class="progress-bar-custom mb-3"><div style="width: 82%"></div></div>
            <p class="mb-0">You are on track to exceed this week’s study goal with strong consistency.</p>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="feature-card reveal">
            <h4 class="mb-3">Milestones</h4>
            <div class="mini-stat"><span>Completed</span><strong>11</strong></div>
            <div class="mini-stat"><span>In progress</span><strong>3</strong></div>
            <div class="mini-stat"><span>Upcoming</span><strong>2</strong></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
