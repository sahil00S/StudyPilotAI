<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | StudyPilot AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>
  <body>
    <main class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 24px;">
      <div class="feature-card" style="max-width: 460px; width: 100%;">
        <h2 class="mb-3">Welcome back</h2>
        <p class="text-muted">Log in to continue your study flow.</p>
        <form class="mt-4">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" placeholder="you@example.com" />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" placeholder="••••••••" />
          </div>
          <button class="btn btn-primary-custom w-100">Log in</button>
        </form>
        <p class="mt-3 text-center"><a href="signup.html">Create an account</a></p>
      </div>
    </main>
  </body>
</html>
