<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | StudyPilot AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
      <div class="container-xxl px-3 px-lg-4">
        <a class="navbar-brand" href="index.html">Study<span>Pilot</span> AI</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <i class="bi bi-list"></i>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-3">
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="features.html">Features</a></li>
            <li class="nav-item"><a class="nav-link" href="pricing.html">Pricing</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <button id="themeToggle" class="btn btn-outline-custom" type="button" aria-label="Toggle theme"><i class="bi bi-moon-stars"></i></button>
            <a class="btn btn-primary-custom" href="signup.html">Join now</a>
          </div>
        </div>
      </div>
    </nav>

    <main>
      <section class="hero-section" style="padding-top: 120px; min-height: auto;">
        <div class="container-xxl px-3 px-lg-4">
          <div class="row g-4 align-items-center">
            <div class="col-lg-6 reveal">
              <div class="section-heading">
                <h2>Let’s talk about your study workflow</h2>
                <p>Questions, feedback, or partnership ideas? We’d love to hear from you.</p>
              </div>
              <div class="feature-card">
                <p><i class="bi bi-envelope"></i> hello@studypilot.ai</p>
                <p><i class="bi bi-telephone"></i> +1 (555) 014-2218</p>
              </div>
            </div>
            <div class="col-lg-6 reveal">
              <div class="feature-card">
                <h4>Send a message</h4>
                <form>
                  <div class="mb-3">
                    <input class="form-control" placeholder="Your name" />
                  </div>
                  <div class="mb-3">
                    <input class="form-control" placeholder="Your email" />
                  </div>
                  <div class="mb-3">
                    <textarea class="form-control" rows="4" placeholder="How can we help?"></textarea>
                  </div>
                  <button class="btn btn-primary-custom" type="button">Send message</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container-xxl px-3 px-lg-4 d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
        <span>© <span id="year"></span> StudyPilot AI</span>
        <div class="d-flex gap-3">
          <a href="privacy.html">Privacy</a>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
